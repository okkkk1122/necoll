services:
  postgres:
    image: postgres:16-alpine
    container_name: necoll-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-necoll}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-necoll_secret}
      POSTGRES_DB: ${POSTGRES_DB:-necoll_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-necoll} -d ${POSTGRES_DB:-necoll_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: necoll-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: necoll-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-necoll_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-necoll_minio_secret}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  minio-init:
    image: minio/mc:latest
    container_name: necoll-minio-init
    depends_on:
      minio:
        condition: service_started
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-necoll_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-necoll_minio_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-necoll-uploads}
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set necoll http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb necoll/$${MINIO_BUCKET} --ignore-existing;
      mc anonymous set download necoll/$${MINIO_BUCKET};
      echo 'MinIO bucket ready';
      "
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: necoll-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${BACKEND_PORT:-4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-necoll}:${POSTGRES_PASSWORD:-necoll_secret}@postgres:5432/${POSTGRES_DB:-necoll_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-necoll_jwt_super_secret_change_in_production}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-necoll_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-necoll_minio_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-necoll-uploads}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3011}
      SITE_URL: ${SITE_URL:-http://localhost:3011}
      PRISMA_ENGINES_MIRROR: ${PRISMA_ENGINES_MIRROR:-https://registry.npmmirror.com/-/binary/prisma}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  store:
    build:
      context: ./store
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3011/api}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3011}
    container_name: necoll-store
    restart: unless-stopped
    command: ["npm", "run", "start"]
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOSTNAME: ${HOST:-0.0.0.0}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3011/api}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3011}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://backend:4000/api}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 90s

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3011/api}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3011}
    container_name: necoll-admin
    restart: unless-stopped
    command: ["npm", "run", "start"]
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOSTNAME: ${HOST:-0.0.0.0}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3011/api}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3011}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://backend:4000/api}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/admin"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: necoll-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-3011}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      store:
        condition: service_healthy
      admin:
        condition: service_healthy

  # adminer — فقط برای محیط محلی؛ در سرور غیرفعال است.
  # برای فعال‌سازی: کامنت‌ها را بردارید یا از docker-compose.dev.yml استفاده کنید.
  # adminer:
  #   image: adminer:latest
  #   container_name: necoll-adminer
  #   restart: unless-stopped
  #   ports:
  #     - "${ADMINER_PORT:-8080}:8080"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
