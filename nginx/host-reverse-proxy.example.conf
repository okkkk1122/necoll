# نمونه پیکربندی Nginx روی سرور (جلوی Docker)
# اگر هر مسیر را جداگانه به کانتینر می‌فرستید، حتماً /_next/ را به فروشگاه بدهید — نه ادمین.
#
# گزینه ۱ (توصیه‌شده): همه چیز از طریق nginx داخل Docker
#   proxy_pass http://127.0.0.1:80;   # SITE_PORT=80 در .env
#
# گزینه ۲: مسیریابی مستقیم به کانتینرها

server {
    listen 443 ssl http2;
    server_name necoll.ir www.necoll.ir;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    client_max_body_size 50M;

    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ⚠️ مهم: استاتیک فروشگاه — مسیر /_next/ (بدون /admin)
    location /_next/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
        return 301 /admin/;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:80/uploads/;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
