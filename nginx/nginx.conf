events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 50M;
    proxy_read_timeout 300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;

    server {
        listen 80;
        server_name localhost;

        # API → backend:4000
        location /api/ {
            set $upstream_backend backend:4000;
            proxy_pass http://$upstream_backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # فایل‌های آپلود → MinIO
        location /uploads/ {
            rewrite ^/uploads/(.*)$ /necoll-uploads/$1 break;
            set $upstream_minio minio:9000;
            proxy_pass http://$upstream_minio;
            proxy_set_header Host minio:9000;
        }

        # فایل‌های استاتیک Next.js فروشگاه — باید قبل از /admin/ باشد
        location /_next/ {
            set $upstream_store store:3000;
            proxy_pass http://$upstream_store$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Admin → admin:3000
        location /admin/ {
            set $upstream_admin admin:3000;
            proxy_pass http://$upstream_admin$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /admin {
            return 301 /admin/;
        }

        # Store → store:3000
        location / {
            set $upstream_store store:3000;
            proxy_pass http://$upstream_store$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
