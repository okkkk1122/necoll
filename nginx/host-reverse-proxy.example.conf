# نمونه Nginx بیرونی روی سرور (SSL termination)
# یا همه ترافیک را به nginx داخل Docker بفرستید: proxy_pass http://127.0.0.1:80;

server {
    listen 443 ssl http2;
    server_name necoll.ir www.necoll.ir;

    # ssl_certificate /etc/letsencrypt/live/necoll.ir/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/necoll.ir/privkey.pem;

    client_max_body_size 50M;

    location /api/ {
        proxy_pass http://127.0.0.1:80$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /_next/ {
        proxy_pass http://127.0.0.1:80$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /admin {
        proxy_pass http://127.0.0.1:80$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:80$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://127.0.0.1:80$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 80;
    server_name necoll.ir www.necoll.ir;
    return 301 https://$host$request_uri;
}
