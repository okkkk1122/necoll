# Override برای توسعه محلی — hot-reload
# COMPOSE_FILE=docker-compose.yml:docker-compose.dev.yml

services:
  backend:
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    environment:
      NODE_ENV: development
    networks:
      - necoll-network

  store:
    build:
      context: ./store
      dockerfile: Dockerfile.dev
    volumes:
      - ./store/src:/app/src
      - ./store/public:/app/public
    environment:
      NODE_ENV: development
    networks:
      - necoll-network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    volumes:
      - ./admin/src:/app/src
      - ./admin/public:/app/public
    environment:
      NODE_ENV: development
    networks:
      - necoll-network

  minio:
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - necoll-network

  adminer:
    image: adminer:latest
    container_name: necoll-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - necoll-network

networks:
  necoll-network:
    name: necoll-network
    external: false
